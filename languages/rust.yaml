name: rust
package_manager: cargo
init_command: cargo init --name {artifact_name}
test_command: cargo test
sync_command: cargo build
add_dependency_command: cargo add {package}
project_structure:
  - Cargo.toml
  - src/
  - tests/
prompt_supplement: |
  Always call run_tests before making any changes to understand the current state.
  Always call run_tests after every file change to verify progress.
  Never rewrite the same file more than once without calling run_tests in between.
  If run_tests fails, read the error output carefully and fix the specific error before trying anything else.
  Always place source code under src/.
  Always write tests under tests/.
  Always include a Cargo.toml declaring dependencies.
  Use cargo as the package manager.
  Always include dev-dependencies in Cargo.toml for testing utilities if needed.
  The built-in #[cfg(test)] module is sufficient for unit tests — always use it.
  Always write at least one test per public function.
  A run_tests tool is available — use it after writing or modifying code.
  Always iterate until run_tests returns a passing result.
  To add a crate dependency, call: {"kind": "tool_call", "name": "add_dependency", "arguments": {"package": "serde"}}
  To write a file, call: {"kind": "tool_call", "name": "write_file", "arguments": {"path": "src/main.rs", "content": "..."}}
