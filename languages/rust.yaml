name: rust
init_command: cargo init --name {artifact_name}
test_command: cargo test
sync_command: cargo build
prompt_supplement: |
  Always place source code under src/.
  Always write tests under tests/.
  Always include a Cargo.toml declaring dependencies.
  Use cargo as the package manager.
  Always include dev-dependencies in Cargo.toml for testing utilities if needed.
  The built-in #[cfg(test)] module is sufficient for unit tests — always use it.
  Always write at least one test per public function.
  Add required crates in Cargo.toml/Cargo.lock in the worktree.
work_output_example: |
  Use paths such as src/main.rs and tests/integration_test.rs.
  Keep runtime crates in Cargo.toml/Cargo.lock.
  Keep test-only utilities under dev-dependencies in Cargo.toml.
  Final response:
  {{
    "kind": "work_output",
    "summary": "Implemented Rust changes and updated tests.",
    "base_version": "{base_version}"
  }}
