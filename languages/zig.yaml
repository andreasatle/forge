name: zig
package_manager: zig build
init_command: zig init
test_command: zig build test
sync_command: zig build
add_dependency_command: zig fetch {package}
project_structure:
  - build.zig
  - src/
  - tests/
prompt_supplement: |
  Check the current test status before making changes when test execution is available.
  Verify progress after each file change when test execution is available.
  Never rewrite the same file more than once without checking test status in between.
  If tests fail, read the error output carefully and fix the specific error before trying anything else.
  Always place source code under src/.
  Always write tests under tests/.
  Always include a build.zig build file.
  Use zig build as the build tool.
  Always write tests using the built-in std.testing module.
  Always write at least one test per public function.
  Include test steps in build.zig so `zig build test` runs all tests.
  Always iterate until tests pass.
  List required packages in the final dependency output.
