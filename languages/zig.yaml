name: zig
package_manager: zig build
test_command: zig build test
sync_command: zig build
project_structure:
  - build.zig
  - src/
  - tests/
prompt_supplement: |
  Always place source code under src/.
  Always write tests under tests/.
  Always include a build.zig build file.
  Use zig build as the build tool.
  Always write tests using the built-in std.testing module.
  Always write at least one test per public function.
  Include test steps in build.zig so `zig build test` runs all tests.
  A run_tests tool is available — use it after writing or modifying code.
  Always iterate until run_tests returns a passing result.
