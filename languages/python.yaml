name: python
package_manager: uv
init_command: uv init --no-readme --no-workspace --name {artifact_name}
test_command: uv run pytest
sync_command: uv sync
add_dependency_command: uv add {package}
project_structure:
  - pyproject.toml
  - src/
  - tests/
prompt_supplement: |
  Always call run_tests before making any changes to understand the current state.
  Always call run_tests after every file change to verify progress.
  Never rewrite the same file more than once without calling run_tests in between.
  If run_tests fails, read the error output carefully and fix the specific error before trying anything else.
  Always place source code under src/.
  Always write tests under tests/ using pytest.
  Always include a pyproject.toml declaring dependencies and requiring Python >=3.12.
  Use uv as the package manager — never requirements.txt.
  Always include pytest as a dev dependency in pyproject.toml:
    [project.optional-dependencies]
    dev = ["pytest"]
  Always include pythonpath = ["src"] in [tool.pytest.ini_options] so pytest can find modules without the src. prefix:
    [tool.pytest.ini_options]
    testpaths = ["tests"]
    pythonpath = ["src"]

  Import modules directly by name, not with src. prefix:
    correct:   from scraper import WebScraper
    incorrect: from src.scraper import WebScraper
  A run_tests tool is available — use it after writing or modifying code.
  Always iterate until run_tests returns a passing result.
  Run `uv add --dev pytest` to add pytest as a dev dependency.
  To install a package, call: {"kind": "tool_call", "name": "add_dependency", "arguments": {"package": "requests"}}
