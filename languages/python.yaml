name: python
init_command: uv init --vcs none --no-readme --no-workspace --name {artifact_name} && uv add --dev pytest
test_command: uv run pytest
sync_command: uv sync
prompt_supplement: |
  Always place source code under src/.
  Always write tests under tests/ using pytest.
  Always include a pyproject.toml declaring dependencies and requiring Python >=3.12.
  Use uv as the package manager — never requirements.txt or setup.py.
  uv owns dependency management — add runtime packages with uv in the worktree.
  Dev packages are handled by project initialization. Tool configuration
  sections (e.g. [tool.ruff], [tool.pytest.ini_options]) may be added
  when required by the task.
  Always include pythonpath = ["src"] in [tool.pytest.ini_options] so pytest can find modules without the src. prefix:
    [tool.pytest.ini_options]
    testpaths = ["tests"]
    pythonpath = ["src"]

  Import modules directly by name, not with src. prefix.
  Imports behave as if src/ is already on the Python path.

  Correct:
    from mymodule import MyClass

  Incorrect — never use these forms:
    from src.mymodule import MyClass
    from <artifact>.src.mymodule import MyClass
  Never add Python stdlib modules as dependencies — csv, json, os,
  re, pathlib, sys, and similar built-in modules are always available
  without installation.

  Verification rules:
  - Before concluding the success condition is already met, you MUST run the available test suite to verify.
  - If pytest reports 0 tests collected, the task is NOT done — you must write tests.
  - If pytest fails, the task is NOT done — fix the failures.

  Package rules:
  - Add required runtime packages with uv so pyproject.toml and uv.lock
    are changed in the worktree:
      uv add <package-name>
      uv add <package-one> <package-two>
  - uv is the package manager, not a package used by the project.
    Do not add uv itself as a dependency.
    Do not put uv in [project].dependencies.
    Do not put uv in [build-system].requires.
  - Do not list dependencies in WorkOutput; dependency changes are captured by git.
work_output_example: |
  Example of valid worktree changes plus WorkOutput completion metadata:
  - write src/example.py and tests/test_example.py in the worktree
  - add required runtime packages with uv so pyproject.toml/uv.lock change in the worktree
  Final response:
  {{
    "kind": "work_output",
    "summary": "Implemented Python module, added tests, and added required runtime dependencies.",
    "base_version": "{base_version}"
  }}