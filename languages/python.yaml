name: python
package_manager: uv
init_command: uv init --no-readme --no-workspace --name {artifact_name} && uv add --dev pytest
test_command: uv run pytest
sync_command: uv sync
add_dependency_command: uv add {package}
project_structure:
  - pyproject.toml
  - src/
  - tests/
prompt_supplement: |
  Always place source code under src/.
  Always write tests under tests/ using pytest.
  Always include a pyproject.toml declaring dependencies and requiring Python >=3.12.
  Use uv as the package manager — never requirements.txt or setup.py.
  Always include pytest as a dev dependency in pyproject.toml:
    [project.optional-dependencies]
    dev = ["pytest"]
  Always include pythonpath = ["src"] in [tool.pytest.ini_options] so pytest can find modules without the src. prefix:
    [tool.pytest.ini_options]
    testpaths = ["tests"]
    pythonpath = ["src"]
  pytest plugins (pytest-mock, pytest-cov, pytest-asyncio, etc.) are dev
  dependencies — add them to [project.optional-dependencies] dev via an
  edit, never in DeltaState.dependencies.

  Import modules directly by name, not with src. prefix:
    correct:   from scraper import WebScraper
    incorrect: from src.scraper import WebScraper
  List required runtime packages in the final dependency output.
  Never add Python stdlib modules as dependencies — csv, json, os,
  re, pathlib, sys, and similar built-in modules are always available
  without installation.

  Verification rules:
  - Before concluding the success condition is already met, you MUST run the available test suite to verify.
  - If pytest reports 0 tests collected, the task is NOT done — you must write tests.
  - If pytest fails, the task is NOT done — fix the failures.

  Package rules:
  - Declare all required runtime packages in the dependencies field of your
    DeltaState response — this is the ONLY way to add packages.
  - Never attempt to install packages via tools, shell commands, or
    any other mechanism.
delta_example: |
  Example of a valid DeltaState response:
  {{
    "new_files": [
      {{"path": "src/scraper.py", "content": "import requests\nfrom bs4 import BeautifulSoup\n"}},
      {{"path": "tests/test_scraper.py", "content": "from scraper import WebScraper\n\ndef test_import():\n    assert WebScraper\n"}}
    ],
    "edits": [
      {{"path": "pyproject.toml", "old": "dependencies = []", "new": "dependencies = [\"requests\"]"}}
    ],
    "dependencies": ["requests"],
    "errors": [],
    "base_version": {base_version}
  }}
