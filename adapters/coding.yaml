name: coding
description: Writes and edits code
tools:
  - list_files
  - read_file
  - run_tests
prompt_template: |
  Complete the following task: {objective}
  Success condition: {success_condition}

  Example of a valid DeltaState response:
  {{
    "new_files": [
      {{"path": "src/foo.py", "content": "def hello():\n    pass\n"}},
      {{"path": "tests/test_foo.py", "content": "from foo import hello\n\ndef test_hello():\n    hello()\n"}}
    ],
    "edits": [
      {{"path": "pyproject.toml", "old": "name = \"old\"", "new": "name = \"new\""}}
    ],
    "dependencies": ["requests"],
    "errors": [],
    "base_version": {base_version}
  }}

  Package rules:
  - Declare all required packages in the dependencies field of your
    DeltaState response — this is the ONLY way to add packages
  - Never attempt to install packages via tools, shell commands, or
    any other mechanism
  - csv, json, os, re, and other stdlib modules are never dependencies
  - Only list third-party packages that must be installed via uv
  - pytest plugins (pytest-mock, pytest-cov, etc.) are dev dependencies
    — add them to pyproject.toml [project.optional-dependencies] dev
    via an edit, never in DeltaState.dependencies
