name: coding
description: Writes and edits code
requires_nonempty_output: true
work_noun: implementation
tools:
  - list_files
  - read_file
  - run_tests
prompt_template: |
  Complete the following task: {objective}
  Success condition: {success_condition}

  Language-specific output conventions:
  {delta_example}

  Verification rules:
  - Before concluding the success condition is already met, you MUST call run_tests to verify
  - If run_tests returns 0 tests collected, the task is NOT done — you must write tests
  - If run_tests fails, the task is NOT done — fix the failures

  Package rules:
  - Declare all required packages in the dependencies field of your
    DeltaState response — this is the ONLY way to add packages
  - Never attempt to install packages via tools, shell commands, or
    any other mechanism
  - csv, json, os, re, and other stdlib modules are never dependencies

  IMPORTANT — your final JSON response MUST be a non-empty DeltaState:
  - new_files must contain the complete content of every file you create
  - edits must contain every change to existing files
  - An empty DeltaState is always wrong
  - Do not summarise what you would do — write the actual file contents
