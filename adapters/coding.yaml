name: coding
description: Writes and edits code
requires_nonempty_output: true
work_noun: implementation
tools:
  - list_files
  - read_file
  - run_tests
prompt_template: |
  Complete the following task: {objective}
  Success condition: {success_condition}

  Language-specific output conventions:
  {delta_example}

  IMPORTANT — your final JSON response MUST be a non-empty WorkOutput:
  - files must contain the complete content of every file you create or modify
  - An empty WorkOutput is always wrong
  - Do not summarise what you would do — write the actual file contents
