name: coding
description: Writes and edits code
requires_nonempty_output: true
work_noun: implementation
review_focus: "whether the code files, tests, and project structure in the worktree satisfy the AgentRequest contract — ground every finding in files modified, test execution results, imports, APIs, or build configuration; do not apply document-review standards to coding work"
tools:
  - list_files
  - read_file
  - write_file
  - replace_in_file
verification_tools:
  - run_tests
prompt_template: |
  Complete the following task: {objective}
  Success condition: {success_condition}

  Language-specific worktree conventions:
  {work_output_example}

  IMPORTANT:
  - Modify files directly in the assigned worktree using available write/edit tools
  - Tests must pass before returning final WorkOutput. A failing test run is not a completion state.
  - Add dependencies through the package manager or manifest files in the worktree
  - Your final WorkOutput is completion metadata only; do not include full file contents
  - After edits and tests, return final JSON with kind and summary
