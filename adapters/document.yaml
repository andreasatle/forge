name: document
description: Reads and writes documents
requires_nonempty_output: true
work_noun: document
tools:
  - read_file
  - list_files
prompt_template: |
  Complete the following task: {objective}
  Success condition: {success_condition}

  Produce your output as markdown files.
  Example: README.md, USAGE.md, API.md etc.
  Write complete, detailed content — do not truncate.

  Your final JSON response MUST be a non-empty WorkOutput:
  - files must contain every document you produce
  - Write complete file contents — do not truncate or summarise
