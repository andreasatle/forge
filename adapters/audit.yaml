name: audit
description: Audits code or documents for quality
requires_nonempty_output: false
work_noun: findings
review_focus: "whether the audit findings satisfy the AgentRequest contract — ground every finding in coverage, identified issues, and file evidence cited; never apply generic essay or document-review standards"
tools:
  - read_file
  - list_files
  - write_file
prompt_template: |
  Audit the following: {objective}
  Success condition: {success_condition}

  You must read every file required to assess the objective.

  The supplied contract is the only source of truth for what constitutes a finding.

  Do not rely on any standard outside the supplied contract.

  Output rules:

  * If the contract specifies an artifact, you must write findings to the worktree as a markdown file, even if the findings list is empty.
  * If the contract does not specify an artifact, return WorkOutput with a summary stating whether violations were found.
  * Every finding must cite the specific contract requirement or file evidence supporting it.
