northstar: "build a web scraper in Python"
workspace: ./workspaces/scraper
concurrency: 1
verbose: false
max_retries: 3
max_tokens: 8192
max_tool_iterations: 25
models:
  planner:
    producer: claude/claude-haiku-4-5
    critic: claude/claude-haiku-4-5
    referee: claude/claude-haiku-4-5
    max_attempts: 3

  worker:
    producer: ollama/qwen2.5-coder:14b
    critic: ollama/gemma4:e4b
    referee: ollama/gemma4:e4b
    max_attempts: 5

  worker_profiles:
    fast:
      producer: ollama/qwen2.5-coder:7b
      critic: ollama/gemma3:latest
      referee: ollama/gemma3:latest
      max_attempts: 2

    strong:
      producer: ollama/qwen2.5-coder:14b
      critic: ollama/gemma4:26b
      referee: ollama/gemma4:26b
      max_attempts: 5

  complexity_classifier:
    model: claude/claude-haiku-4-5
    max_tokens: 512
    complexity_to_profile:
      easy: fast
      medium: default
      hard: strong
artifacts:
  - name: codebase
    type: coding
    language: python
    description: Python package containing the scraper implementation and tests.
  - name: docs
    type: document
    description: User-facing documentation for installing, running, and using the scraper.
